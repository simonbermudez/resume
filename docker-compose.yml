services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: resume-v2:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # Do NOT publish to the host. Dokploy's Traefik proxy reaches the container
    # over the internal Docker network; attach a domain to port 3000 in the UI.
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
